name: SAST (Semgrep)

on:
  push:
    branches:
      - "**"
    paths:
      - "src/**"
      - "gui/**"
      - "tests/**"
      - "main.py"
      - "requirements*.txt"
      - ".github/workflows/sast.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "src/**"
      - "gui/**"
      - "tests/**"
      - "main.py"
      - "requirements*.txt"
      - ".github/workflows/sast.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST (block High/Critical)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Semgrep scan (High/Critical)
        run: |
          semgrep \
            --config p/ci \
            --config p/python \
            --severity ERROR \
            --error \
            src gui tests main.py
