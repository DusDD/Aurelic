name: SAST (Semgrep)

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "gui/**"
      - "controller/**"
      - "data/**"
      - "tests/**"
      - "main.py"
      - ".github/workflows/sast.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "src/**"
      - "gui/**"
      - "controller/**"
      - "data/**"
      - "tests/**"
      - "main.py"
      - ".github/workflows/sast.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST (block High/Critical)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Semgrep scan (High/Critical)
        run: |
          semgrep \
            --config p/ci \
            --config p/python \
            --severity ERROR \
            --error \
            src gui controller data tests main.py

  finalize:
    name: Finalize (status summary)
    runs-on: ubuntu-latest
    needs: [semgrep]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "semgrep result: ${{ needs.semgrep.result }}"
          if [ "${{ needs.semgrep.result }}" != "success" ]; then
            echo "SAST failed."
            exit 1
          fi
          echo "SAST succeeded."
