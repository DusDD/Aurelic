name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: meta
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> "$GITHUB_OUTPUT"


      - name: Build Backend (local, no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          load: true
          push: false
          tags: backend-temp:${{ github.sha }}

      - name: Scan Backend Image (local)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: backend-temp:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Push Backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}-backend:latest
            ghcr.io/${{ steps.meta.outputs.repo_lower }}-backend:${{ github.sha }}


      - name: Build Frontend (local, no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          load: true
          push: false
          tags: frontend-temp:${{ github.sha }}

      - name: Scan Frontend Image (local)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: frontend-temp:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}-frontend:latest
            ghcr.io/${{ steps.meta.outputs.repo_lower }}-frontend:${{ github.sha }}


      - name: Generate SBOM (Backend)
        uses: anchore/sbom-action@v0
        with:
          image: backend-temp:${{ github.sha }}
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - name: Generate SBOM (Frontend)
        uses: anchore/sbom-action@v0
        with:
          image: frontend-temp:${{ github.sha }}
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms-${{ github.sha }}
          path: |
            backend-sbom.spdx.json
            frontend-sbom.spdx.json

