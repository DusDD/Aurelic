name: CI

on:
  pull_request:

jobs:
  backend:
    name: Backend - Lint & Tests
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: ${{ secrets.DB_NAME }}
          MARIADB_USER: ${{ secrets.DB_USER }}
          MARIADB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "1"
        ports:
          - 3306:3306
    defaults:
      run:
        working-directory: apps/backend
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      DJANGO_DEBUG: "0"
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format (check)
        run: ruff format --check .
      - name: Wait for DB
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client
          for i in {1..30}; do
            echo "DB check attempt $i..."
            mariadb-admin ping -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" --password="$DB_PASSWORD" --protocol=tcp --connect-timeout=2 && exit 0
            sleep 2
          done
          echo "DB not ready in time" >&2
          exit 1
      - name: Migrate
        run: python manage.py migrate --noinput
      - name: Tests
        run: python manage.py test

  frontend:
    name: Frontend - ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
