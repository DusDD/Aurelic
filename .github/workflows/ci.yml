name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "gui/**"
      - "tests/**"
      - "main.py"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "src/**"
      - "gui/**"
      - "tests/**"
      - "main.py"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  python:
    name: Python - Lint & Tests (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app_user -d app_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      # App DB envs (genau wie in eurem config.py)
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: app_test
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass

      # Damit euer Import nicht crasht:
      POLYGON_API_KEY: "ci-dummy-key"
      ALPHAVANTAGE_API_KEY: "ci-dummy-key"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements.txt -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            python -m pip install .
          else
            echo "No dependency file found (requirements.txt / requirements-dev.txt / pyproject.toml)" >&2
            exit 1
          fi

      - name: Ruff lint
        run: |
          python -m pip install ruff
          ruff check .

      - name: Ruff format (check)
        run: |
          python -m pip install ruff
          ruff format --check .

      - name: Run tests
        run: |
          python -m pip install pytest || true
          if python -c "import pytest" 2>/dev/null; then
            pytest -q
          else
            python -m unittest discover -s tests -p "test*.py"
          fi
